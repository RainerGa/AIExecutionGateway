# OpenAI Codex Task Execution API - Configuration File
# ===================================================
#
# This file defines the configuration for the REST API.
# The configuration resolution follows this order of precedence:
# 1. Internal defaults (defined in app/core/config.py)
# 2. Values in this file under [defaults]
# 3. Values in the active profile (e.g., [profiles.home])
# 4. Environment variables (e.g., APP_LOG_LEVEL=DEBUG)

# The default profile to use if APP_ACTIVE_PROFILE is not set as an environment variable.
active_profile = "home"

# ------------------------------------------------------------------------------
# GLOBAL DEFAULTS
# ------------------------------------------------------------------------------
[defaults]
# Metadata for the FastAPI application and OpenAPI documentation.
app_name = "OpenAI Codex Task Execution API"
app_description = "Enterprise-oriented REST API for orchestrating Codex task execution through a versioned FastAPI service."

# The base path for all API routes (e.g., /api/v1/execute_task).
api_prefix = "/api/v1"

# Whether to enable the interactive Swagger UI and ReDoc documentation.
enable_docs = true

# The minimum level for log messages (DEBUG, INFO, WARNING, ERROR, CRITICAL).
log_level = "INFO"

# List of origins that are allowed to make cross-site HTTP requests.
cors_allowed_origins = ["http://localhost", "http://127.0.0.1"]

[defaults.codex]
# Optional. Path to a project template that is copied to the session workspace before execution.
# This allows providing a base set of files for every task execution.
project_source = ""

# Optional. Base directory where session-specific copies of the project_source are created.
# If empty, a temporary directory is used for each request.
sessions_base_path = ""

# ------------------------------------------------------------------------------
# SECURITY DEFAULTS
# ------------------------------------------------------------------------------

[defaults.auth]
# The authentication strategy to use:
# - "disabled": No authentication required (local development).
# - "trusted_header": Identity is provided by a trusted proxy via HTTP headers.
# - "oidc_jwt": Bearer tokens are validated against an OpenID Connect provider.
mode = "disabled"

[defaults.authorization]
# Whether to enable role-based access control (RBAC).
enabled = false

# List of roles allowed to call the task execution endpoints.
execute_task_roles = ["admin", "user"]

# Mapping of external groups (from OIDC or Headers) to internal roles.
admin_groups = []
user_groups = []
readonly_groups = []

[defaults.audit]
# Whether to log detailed audit events for sensitive operations.
enabled = false

[defaults.oidc]
# Configuration for OpenID Connect (e.g., Microsoft Entra ID, Okta, Keycloak).
issuer = ""
audience = ""
jwks_url = ""
algorithms = ["RS256"]
required_claims = ["sub"]
subject_claim = "sub"
username_claim = "preferred_username"
email_claim = "email"
groups_claim = "groups"
roles_claim = "roles"
tenant_claim = "tid"
clock_skew_seconds = 60

[defaults.trusted_header]
# Configuration for proxy-based authentication (e.g., IIS with Windows Auth, Nginx).
user_header = "X-Authenticated-User"
email_header = "X-Authenticated-Email"
groups_header = "X-Authenticated-Groups"
roles_header = "X-Authenticated-Roles"
group_separator = ";"
trusted_proxy_ips = []

# ------------------------------------------------------------------------------
# PROFILES
# ------------------------------------------------------------------------------

# LOCAL DEVELOPMENT PROFILE
# Use this for local testing without the need for an authentication provider.
[profiles.home]
environment = "development"
enable_docs = true
log_level = "DEBUG"

[profiles.home.auth]
mode = "disabled"

# ENTERPRISE / PRODUCTION PROFILE
# Use this for deployment in an environment with SSO and RBAC enabled.
[profiles.company]
environment = "production"
enable_docs = false
log_level = "INFO"

[profiles.company.auth]
mode = "oidc_jwt"

[profiles.company.authorization]
enabled = true
# Example group mapping for enterprise environments:
admin_groups = ["Codex-Admins"]
user_groups = ["Codex-Users"]
readonly_groups = ["Codex-Readonly"]

[profiles.company.audit]
enabled = true

[profiles.company.oidc]
# Placeholders for Microsoft Entra ID configuration.
issuer = "https://login.microsoftonline.com/<tenant-id>/v2.0"
audience = "api://codex-rest-api"
jwks_url = "https://login.microsoftonline.com/<tenant-id>/discovery/v2.0/keys"

# Optional alternative for Windows Integrated Authentication behind a trusted proxy:
# To use this, change mode to "trusted_header" in [profiles.company.auth]
# [profiles.company.trusted_header]
# user_header = "X-Authenticated-User"
# email_header = "X-Authenticated-Email"
# groups_header = "X-Authenticated-Groups"
# roles_header = "X-Authenticated-Roles"
# group_separator = ";"
# trusted_proxy_ips = ["10.0.0.10", "10.0.0.11"]
